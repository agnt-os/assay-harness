name: Codex Review

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  quality-context:
    name: Quality context
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile=false
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build

  codex-review:
    name: Codex review
    needs: quality-context
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    outputs:
      final_message: ${{ steps.run-codex.outputs.final-message }}
    steps:
      - name: Check Codex secret
        id: config
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY is not configured. Quality checks ran, but Codex review is skipped."
          fi
      - uses: actions/checkout@v4
        if: steps.config.outputs.enabled == 'true'
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - name: Fetch base and head refs
        if: steps.config.outputs.enabled == 'true'
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"
      - name: Run Codex review
        if: steps.config.outputs.enabled == 'true'
        id: run-codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          prompt: |
            ### Codex Review: Implementation & Hygiene

            You are the first agent in a three-part "Chain of Review" (Codex -> Gemini -> Claude).
            Your role is "The Implementation & Hygiene Expert".

            Review only the changes introduced by the PR. Focus exclusively on:
            - Benchmark implementation hygiene: code structure, naming, and readability.
            - Provider adapter correctness and type safety.
            - Deterministic behaviour: ensure seed/config/version are handled correctly.
            - Performance micro-optimizations in evaluation loops.

            Do NOT focus on high-level architecture, Labs strategic alignment, or 
            evaluator standards; subsequent agents (Gemini and Claude) will handle 
            those domains.

            Pull request title:
            ${{ github.event.pull_request.title }}

            Pull request body:
            ${{ github.event.pull_request.body }}

  post-feedback:
    name: Post Codex feedback
    needs: codex-review
    if: needs.codex-review.outputs.final_message != ''
    runs-on: ubuntu-latest
    steps:
      - name: Report Codex feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
