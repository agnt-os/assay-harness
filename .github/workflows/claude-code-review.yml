name: Claude Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Claude review
    needs: gemini-review
    if: always() && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false && (needs.gemini-review.result == 'success' || needs.gemini-review.result == 'failure' || needs.gemini-review.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect review workflow edits
        id: workflow-edits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -Eqx '.github/workflows/(gemini-code-review|claude-code-review|codex-review)\.yml'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping Claude action because this PR modifies AI review workflows."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch existing comments
        if: steps.workflow-edits.outputs.skip != 'true'
        id: fetch-comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr view ${{ github.event.pull_request.number }} --json comments --template '{{range .comments}}{{.author.login}}: {{.body}}{{end}}' > pr_comments.txt

      - name: Run Claude Code Review
        if: steps.workflow-edits.outputs.skip != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ### Claude Review: Architecture & Strategy

            You are the final agent in a three-part "Chain of Review" (Codex -> Gemini -> Claude).
            Your role is "The Architect & Strategist".

            IMPORTANT: Read the existing PR comments below.

            1. TAKEOVER LOGIC:
               - If "### Codex Review" is missing, YOU must also cover Implementation Hygiene.
               - If "### Gemini Review" is missing, YOU must also cover Logic & Boundaries.

            2. AVOID DUPLICATION: Do NOT repeat feedback from Codex or Gemini. Provide the "final word" on architectural direction.

            PRIMARY FOCUS (Architecture & Strategy):
            - Strategic fit for Labs benchmark releases and Assay clean-room standards.
            - Alignment with Modelsmith's product-strategy pillars.
            - High-level architectural integrity and public evaluator boundaries.
            - Security and data leakage (ensuring private prompts/datasets stay separate).

            EXISTING COMMENTS:
            $(cat pr_comments.txt)

            Leave concise, actionable feedback on the PR.
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
