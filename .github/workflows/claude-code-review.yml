name: Claude Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: claude-review-\${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false
    needs: gemini-review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect review workflow edits
        id: workflow-edits
        env:
          BASE_SHA: \${{ github.event.pull_request.base.sha }}
          HEAD_SHA: \${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if git diff --name-only "\$BASE_SHA" "\$HEAD_SHA" | grep -Eqx '.github/workflows/(gemini-code-review|claude-code-review|codex-review)\.yml'; then
            echo "skip=true" >> "\$GITHUB_OUTPUT"
            echo "Skipping Claude action because this PR modifies AI review workflows."
          else
            echo "skip=false" >> "\$GITHUB_OUTPUT"
          fi

      - name: Fetch existing comments
        if: steps.workflow-edits.outputs.skip != 'true'
        id: fetch-comments
        env:
          GH_TOKEN: \${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr view \${{ github.event.pull_request.number }} --json comments --template '{{range .comments}}{{.author.login}}: {{.body}}{{end}}' > pr_comments.txt

      - name: Run Claude Code Review
        if: steps.workflow-edits.outputs.skip != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: \${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the final agent in a three-part "Chain of Review" (Codex -> Gemini -> Claude).
            Your role is "The Architect & Strategist".

            Please review this pull request for:
            - Strategic fit for Labs benchmark releases and Assay clean-room standards.
            - Alignment with Modelsmith's product-strategy pillars.
            - High-level architectural integrity and public evaluator boundaries.
            - Security and data leakage (ensuring private prompts/datasets stay separate).

            IMPORTANT: Read the existing PR comments below from previous agents (Codex and Gemini).
            Do NOT repeat feedback that has already been provided. Your goal is to provide 
            the "final word" on architectural and strategic direction.

            EXISTING COMMENTS:
            $(cat pr_comments.txt)

            Leave concise, actionable feedback on the PR.
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
