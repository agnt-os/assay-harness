name: Gemini Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: gemini-review-\${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gemini-review:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false
    needs: codex-review
    if: always() && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false && (needs.codex-review.result == 'success' || needs.codex-review.result == 'failure' || needs.codex-review.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect review workflow edits
        id: workflow-edits
        env:
          BASE_SHA: \${{ github.event.pull_request.base.sha }}
          HEAD_SHA: \${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if git diff --name-only "\$BASE_SHA" "\$HEAD_SHA" | grep -Eqx '.github/workflows/(gemini-code-review|claude-code-review|codex-review)\.yml'; then
            echo "skip=true" >> "\$GITHUB_OUTPUT"
            echo "Skipping Gemini review because this PR modifies AI review workflows."
          else
            echo "skip=false" >> "\$GITHUB_OUTPUT"
          fi

      - name: Fetch existing comments
        if: steps.workflow-edits.outputs.skip != 'true'
        id: fetch-comments
        env:
          GH_TOKEN: \${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr view \${{ github.event.pull_request.number }} --json comments --template '{{range .comments}}{{.author.login}}: {{.body}}{{end}}' > pr_comments.txt

      - name: Run Gemini Review
        if: steps.workflow-edits.outputs.skip != 'true'
        env:
          GOOGLE_CLOUD_ACCESS_TOKEN: \${{ secrets.GEMINI_CLI_OAUTH_TOKEN }}
          GEMINI_TRUST_WORKSPACE: "true"
          GH_TOKEN: \${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_COMMENTS=\$(cat pr_comments.txt)

          npx -y @google/gemini-cli --yolo --prompt "### Gemini Review: Logic & Boundaries

          You are the second agent in a three-part \"Chain of Review\" (Codex -> Gemini -> Claude).
          Your role is \"The Logic & Boundary Expert\".

          IMPORTANT: Read the existing PR comments below.

          1. TAKEOVER LOGIC: If you do NOT see a comment starting with \"### Codex Review\", the previous agent likely failed (e.g., quota exhaustion). In this case, YOU must also perform the Implementation Hygiene review (naming, structure, adapters) in addition to your Logic review.

          2. AVOID DUPLICATION: Do NOT repeat feedback that has already been provided by Codex. Build on existing comments or pivot to logic concerns they missed.

          PRIMARY FOCUS (Logic & Boundaries):
          - Logical correctness of evaluation scenarios and benchmark scoring.
          - Reproducibility and edge cases in data handling or provider responses.
          - Public API stability and boundary between open Assay and private Modelsmith.
          - Adherence to Platform Autonomy Principles where this harness touches automation.

          EXISTING COMMENTS:
          \${PREVIOUS_COMMENTS}

          Use 'git diff origin/\${{ github.base_ref }}...HEAD' to see the changes."
