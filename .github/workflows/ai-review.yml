name: AI Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write
  actions: read

jobs:
  quality-context:
    name: Quality context
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile=false
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build

  codex-review:
    name: Codex review
    needs: quality-context
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    outputs:
      final_message: ${{ steps.run-codex.outputs.final-message }}
    steps:
      - name: Check Codex secret
        id: config
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY is not configured. Quality checks ran, but Codex review is skipped."
          fi
      - uses: actions/checkout@v4
        if: steps.config.outputs.enabled == 'true'
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - name: Fetch base and head refs
        if: steps.config.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "${{ github.event.pull_request.base.ref }}" \
            "+refs/pull/${{ github.event.pull_request.number }}/head"
      - name: Run Codex review
        if: steps.config.outputs.enabled == 'true'
        id: run-codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          prompt: |
            ### Codex Review: Implementation & Hygiene

            You are the first agent in a three-part "Chain of Review" (Codex -> Gemini -> Claude).
            Your role is "The Implementation & Hygiene Expert".

            Review only the changes introduced by the PR. Focus exclusively on:
            - Benchmark implementation hygiene: code structure, naming, and readability.
            - Provider adapter correctness and type safety.
            - Deterministic behaviour.
            - Performance micro-optimizations.

            Do NOT focus on architecture or strategic alignment.

            Pull request title: ${{ github.event.pull_request.title }}

  post-feedback:
    name: Post Codex feedback
    needs: codex-review
    if: needs.codex-review.outputs.final_message != ''
    runs-on: ubuntu-latest
    steps:
      - name: Report Codex feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });

  gemini-review:
    name: Gemini review
    needs: [quality-context, codex-review]
    if: always() && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false && (needs.codex-review.result == 'success' || needs.codex-review.result == 'failure' || needs.codex-review.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr view ${{ github.event.pull_request.number }} --json comments --template '{{range .comments}}{{.author.login}}: {{.body}}{{end}}' > pr_comments.txt
      - name: Run Gemini Review
        env:
          GOOGLE_CLOUD_ACCESS_TOKEN: ${{ secrets.GEMINI_CLI_OAUTH_TOKEN }}
          GEMINI_TRUST_WORKSPACE: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_COMMENTS=$(cat pr_comments.txt)
          npx -y @google/gemini-cli --yolo --prompt "### Gemini Review: Logic & Boundaries
          Take over hygiene if ### Codex Review is missing. Build on existing comments."

  claude-review:
    name: Claude review
    needs: [quality-context, gemini-review]
    if: always() && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false && (needs.gemini-review.result == 'success' || needs.gemini-review.result == 'failure' || needs.gemini-review.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr view ${{ github.event.pull_request.number }} --json comments --template '{{range .comments}}{{.author.login}}: {{.body}}{{end}}' > pr_comments.txt
      - name: Run Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ### Claude Review: Architecture & Strategy
            Take over if Codex or Gemini headers are missing. Build on previous.
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
